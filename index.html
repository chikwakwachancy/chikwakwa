<!DOCTYPE html>
<html>
<head>
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>GPA Calculator</h1>

   <input type="number" id="course1" placeholder="Course 1 Mark">
<input type="number" id="course2" placeholder="Course 2 Mark">
<input type="number" id="course3" placeholder="Course 3 Mark">
<input type="number" id="course4" placeholder="Course 4 Mark">

<button onclick="calculateGPA()">Calculate GPA</button>

">
